version: "3.9"

services:
  backend:
    build: ./backend
    container_name: clause-backend
    ports:
      - "8000:8000"
    environment:
      SQLALCHEMY_DATABASE_URL: "sqlite:///./clause_tracker.db"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: clause-frontend
    ports:
      - "80:80"
    depends_on:
      - backend